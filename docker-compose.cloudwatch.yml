services:
  api:
    logging:
      driver: awslogs
      options:
        awslogs-region: us-east-1
        awslogs-group: /quiero-menu/api
        awslogs-stream-prefix: api
        awslogs-create-group: "true"

  ui:
    logging:
      driver: awslogs
      options:
        awslogs-region: us-east-1
        awslogs-group: /quiero-menu/ui
        awslogs-stream-prefix: ui
        awslogs-create-group: "true"

  nginx:
    logging:
      driver: awslogs
      options:
        awslogs-region: us-east-1
        awslogs-group: /quiero-menu/nginx
        awslogs-stream-prefix: nginx
        awslogs-create-group: "true"
